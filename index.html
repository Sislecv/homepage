<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sislecv</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000011}
canvas{position:fixed;inset:0;z-index:0;image-rendering:pixelated;cursor:crosshair}
.scanlines{
  position:fixed;inset:0;z-index:10;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.06) 0px, rgba(0,0,0,.06) 1px, transparent 1px, transparent 3px);
}
.name-overlay{
  position:fixed;bottom:32px;left:0;right:0;z-index:6;text-align:center;pointer-events:none;
  font:22px 'VT323','Courier New',monospace;letter-spacing:3px;color:#ffb000;
  text-shadow:0 0 10px rgba(255,176,0,.5),0 0 20px rgba(255,140,0,.25);
}
.subtitle{font:14px 'VT323','Courier New',monospace;letter-spacing:2px;color:#c80;opacity:.7;margin-top:2px}

/* ── CRT Monitor Shell ──────────────────────────────────────────── */
.term-overlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(2px);
}
.term-overlay.open{opacity:1;pointer-events:auto}

.term-monitor{
  position:relative;
  background:#c8bfaa;
  border:6px solid #b8af9a;
  border-radius:18px;
  padding:18px 14px 10px 14px;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.15),
    0 0 0 4px #d8d0bc,
    0 0 0 8px #a09884,
    0 0 0 10px #c8bfaa,
    0 8px 40px rgba(0,0,0,.5);
  animation:monitorIn .35s ease-out;
}
@keyframes monitorIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

.term-monitor::before{
  content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:60%;height:4px;
  background:repeating-linear-gradient(90deg, #888070 0px, #888070 3px, #a09888 3px, #a09888 6px);
  border-radius:2px;
}

.term-monitor::after{
  content:'';position:absolute;bottom:-18px;right:24px;
  width:7px;height:7px;border-radius:50%;
  background:#0f0;
  box-shadow:0 0 6px #0f0,0 0 14px rgba(0,255,0,.5);
  animation:ledPulse 2s ease-in-out infinite;
}
@keyframes ledPulse{0%,100%{opacity:1}50%{opacity:.4}}

.term-brand{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font:10px 'VT323',monospace;color:#888070;letter-spacing:2px;
}

.term-screen{
  background:#0a0a08;
  border:3px solid #1a1a14;
  border-radius:6px;
  overflow:hidden;
  position:relative;
  width:90vw;max-width:600px;
  box-shadow:inset 0 0 40px rgba(0,0,0,.7),inset 0 0 2px rgba(0,255,0,.03);
}
.term-screen::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:repeating-linear-gradient(0deg,
    rgba(0,0,0,.1) 0px,rgba(0,0,0,.1) 2px,
    rgba(0,10,0,.03) 2px,rgba(0,10,0,.03) 4px);
}
.term-screen::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.45) 100%);
}

.term-title{
  display:flex;justify-content:space-between;align-items:center;
  padding:1px 6px;
  background:#b8af9a;
  border-bottom:1px solid #a09884;
  font:12px 'VT323',monospace;color:#332e22;letter-spacing:1px;
  position:relative;z-index:6;
}
.term-title .btns{display:flex;gap:4px}
.term-title .btn{
  width:18px;height:18px;background:#a09884;border:1px solid #8a8270;
  color:#5a5240;font:12px 'VT323',monospace;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;line-height:1;
}
.term-title .btn:hover{background:#8a8270;color:#222}

.term-body{
  padding:12px 16px;
  font:17px 'VT323','Courier New',monospace;
  line-height:1.35;
  color:#8f8;
  white-space:pre-wrap;
  min-height:220px;
  max-height:55vh;
  overflow-y:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
  position:relative;z-index:6;
  text-shadow:0 0 4px rgba(100,255,100,.25),0 0 8px rgba(80,220,80,.12);
}
.term-body::-webkit-scrollbar{display:none}
.term-body .prompt{color:#bfb}
.term-body .cmd{color:#fff}
.term-body .output{color:#7d7}
.term-body .info{color:#6a6}
.term-body .dim{color:#3a3}
.term-body .warn{color:#ff6}
.cursor-blink{
  display:inline-block;width:9px;height:18px;
  background:#8f8;
  animation:blink .9s steps(1) infinite;
  vertical-align:text-bottom;margin-left:1px;
}
@keyframes blink{50%{opacity:0}}

@keyframes screenFlash{
  0%{background:#fff}15%{background:#afb}40%{background:#0a0a08}100%{background:#0a0a08}
}
.term-screen.flash{animation:screenFlash .5s ease-out}

@media(max-width:640px){
  .name-overlay{font-size:16px;bottom:20px}
  .subtitle{font-size:12px}
  .term-body{font-size:14px;padding:8px 10px;min-height:160px}
  .term-monitor{padding:10px 8px 6px 8px;border-width:4px;border-radius:12px}
  .term-monitor::before{top:-8px;height:3px}
  .term-monitor::after{bottom:-14px;width:5px;height:5px}
  .term-brand{font-size:8px;bottom:-18px}
  .term-title{padding:1px 5px;font-size:11px}
  .term-screen{border-width:2px;border-radius:4px}
}
@media(max-width:480px){
  .name-overlay{font-size:13px;bottom:14px}
  .subtitle{font-size:10px}
  .term-body{font-size:12px;padding:5px 7px;min-height:120px}
  .term-monitor{padding:8px 5px 4px 5px;border-width:3px;border-radius:10px}
  .term-monitor::before{display:none}
  .term-title{padding:0 4px;font-size:10px}
  .term-title .btn{width:14px;height:14px;font-size:9px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="scanlines"></div>
<div class="name-overlay">
  <div>Sislecv</div>
  <div class="subtitle">Senior Engineer &amp; AI Orchestrator</div>
</div>

<div class="term-overlay" id="termOverlay">
  <div class="term-monitor">
    <div class="term-screen" id="termScreen">
      <div class="term-title">
        <span>&#9612; MS-DOS</span>
        <div class="btns">
          <span class="btn" id="termMin" title="Minimize">_</span>
          <span class="btn" id="termClose" title="Close">&#10005;</span>
        </div>
      </div>
      <div class="term-body" id="termBody"></div>
    </div>
    <div class="term-brand">SISLEVC 5151</div>
  </div>
</div>

<script>
"use strict";

const fade=t=>t*t*t*(t*(t*6-15)+10);
class Perlin{
  constructor(s){
    const p=[...Array(256)].map((_,i)=>i),r=this._rng(s);
    for(let i=255;i;i--){const j=Math.floor(r()*(i+1));[p[i],p[j]]=[p[j],p[i]]}
    this.perm=[...p,...p];
  }
  _rng(a){return()=>{a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  noise(x,y){
    const X=Math.floor(x)&255,Y=Math.floor(y)&255;
    const xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf);
    const p=this.perm,aa=p[p[X]+Y],ab=p[p[X]+Y+1],ba=p[p[X+1]+Y],bb=p[p[X+1]+Y+1];
    const gr=(h,x,y)=>{const h2=h&3;return(h2&1?x:-x)+(h2&2?y:-y)};
    const L=(a,b,t)=>a+t*(b-a);
    return L(L(gr(aa,xf,yf),gr(ba,xf-1,yf),u),L(gr(ab,xf,yf-1),gr(bb,xf-1,yf-1),u),v);
  }
  fbm(x,y,o=5,l=2,g=.5){let v=0,a=1,f=1,m=0;for(let i=0;i<o;i++){v+=a*this.noise(x*f,y*f);m+=a;a*=g;f*=l}return v/m}
}

const C=document.getElementById('c'),X=C.getContext('2d');
C.width=innerWidth;C.height=innerHeight;
X.fillStyle='#00005f';X.fillRect(0,0,C.width,C.height);

// Responsive cell sizes
function cellSizes(w){return w<480?[12,7,14]:w<768?[14,8,17]:[20,12,24]}
let FS=20,CW=12,CH=24;
(function(){const c=cellSizes(innerWidth);FS=c[0];CW=c[1];CH=c[2]})();

const FONT="'VT323','Courier New',monospace";
const PN=new Perlin(42);
let MX=-999,MY=-999,TX=-999,TY=-999,TM=0;

window.addEventListener('resize',()=>{
  C.width=innerWidth;C.height=innerHeight;
  const c=cellSizes(innerWidth);FS=c[0];CW=c[1];CH=c[2]
});
document.addEventListener('mousemove',e=>{TX=e.clientX;TY=e.clientY});
document.addEventListener('mouseleave',()=>{TX=-999;TY=-999});

let hintAlpha=0;
C.addEventListener('mousemove',()=>{hintAlpha=1});

const G=' .:-=+*#%@';
function nch(v){const t=(v+1)/2;return G[Math.min(9,Math.max(0,~~(t*G.length)))]}
function styl(v){
  const t=(v+1)/2;
  if(t<.15)return{bg:'#00005f',fg:'#444'};
  if(t<.35)return{bg:'#00005f',fg:'#626'};
  if(t<.55)return{bg:'#00005f',fg:'#ccc'};
  if(t<.72)return{bg:'#000087',fg:'#fff'};
  if(t<.88)return{bg:'#0000af',fg:'#fff'};
  return{bg:'#0000d7',fg:'#fff'};
}

const A=[
  "                          %%%%%#                  ",
  "            %%%%%########******###%%              ",
  "            %%==****+==-----::.+##%%              ",
  "            %%=+####+++=====--:*##%%%             ",
  "            %%-+***+++======--:*##%%%%            ",
  "            %#-=+++========---:**#%#%#            ",
  "            %#-==========----::**#%#%#            ",
  "            ##:-====--------:::**#%#%#            ",
  "            ##++++++=======----**###%#            ",
  "            #%%%%#######*********#%%%#            ",
  "            ########****##*******#%#             ",
  "                   =-----------=*                 ",
  "                 ****++++===-=+*#                 ",
  "                      %%%###                      ",
];
const AR=A.length,AC=A[0].length;

function aCol(ch){
  const d=' .:-=+*#%@'.indexOf(ch);if(d<0)return null;
  const t=d/9;
  if(t<.55){
    const gt=t/.55;
    return{r:~~(80-gt*80),g:~~(130+gt*125),b:~~(80-gt*80)};
  }else{
    const bt=(t-.55)/.45;
    return{r:~~(170+bt*85),g:~~(150+bt*75),b:~~(110+bt*65)};
  }
}

function proj(rx,ry,rz,aY,aX){
  const cY=Math.cos(aY),sY=Math.sin(aY),cX=Math.cos(aX),sX=Math.sin(aX);
  const x1=rx*cY+rz*sY;
  const z1=-rx*sY+rz*cY;
  const y2=ry*cX-z1*sX;
  const z2=ry*sX+z1*cX;
  const D=2.5,s=D/(D+z2);
  return{x:x1*s,y:y2*s,z:z2,s};
}

let rY=0,rX=0,targetRY=0,targetRX=0;

function render(ts){
  try{
    const W=C.width,H=C.height;
    if(!W||!H){requestAnimationFrame(render);return}
    MX+=(TX-MX)*.08;MY+=(TY-MY)*.08;TM=ts*.0003;
    if(TX>-100&&TY>-100){targetRY=(TX/W-.5)*Math.PI*.7;targetRX=-(TY/H-.5)*Math.PI*.35}
    rY+=(targetRY-rY)*.04;rX+=(targetRX-rX)*.04;

    const cols=Math.ceil(W/CW),rows=Math.ceil(H/CH);
    const sc=.016,cxB=cols/2,cyB=rows/2;
    const map=new Float32Array(rows*cols);
    for(let py=0;py<rows;py++)for(let px=0;px<cols;px++){
      let nx=px,ny=py;
      if(MX>-100&&MY>-100){const mx0=MX/CW,my0=MY/CH,dx=px-mx0,dy=py-my0,dist=Math.hypot(dx,dy);if(dist<60){const str=(1-dist/60)*(2+Math.sin(dist*.4)*.6),ang=Math.atan2(dy,dx);nx+=Math.cos(ang)*str*4;ny+=Math.sin(ang)*str*4}}
      const dx2=px-cxB,dy2=py-cyB,pulse=Math.sin(Math.hypot(dx2,dy2)*.08-TM*3)*.18;
      map[py*cols+px]=Math.max(-1,Math.min(1,PN.fbm(nx*sc,ny*sc+TM,5)+pulse));
    }

    const bt={};
    for(let py=0;py<rows;py++)for(let px=0;px<cols;px++){
      const v=map[py*cols+px],s=styl(v),ch=nch(v);
      const key=s.bg+'|'+s.fg+'|'+ch;
      if(!bt[key])bt[key]={bg:s.bg,fg:s.fg,ch,cells:[]};
      bt[key].cells.push([px*CW,py*CH]);
    }
    X.fillStyle='#00005f';X.fillRect(0,0,W,H);
    for(const b of Object.values(bt)){
      if(!b.ch||b.ch===' ')continue;
      X.fillStyle=b.bg;for(const[cx,cy]of b.cells)X.fillRect(cx,cy,CW,CH);
      X.fillStyle=b.fg;X.font=`${FS}px ${FONT}`;X.textBaseline='top';
      for(const[cx,cy]of b.cells)X.fillText(b.ch,cx,cy+1);
    }

    const aw=(AC+4)*CW,ah=(AR+2)*CH,ox=W/2,oy=H/2,pts=[];
    const ED=.22,EL=7;
    for(let row=0;row<AR;row++)for(let col=0;col<AC;col++){
      const ch=A[row][col];if(ch===' ')continue;
      const rx=(col-AC/2)/(AC/2)*.9,ry=(row-AR/2)/(AR/2)*.9;
      for(let l=0;l<EL;l++){
        const rz=ED*(l/(EL-1)),p=proj(rx,ry,rz,rY,rX);
        if(p.s<=.01)continue;
        pts.push({px:ox+p.x*(aw/2),py:oy+p.y*(ah/2),ch,s:p.s,z:p.z,layer:l});
      }
    }
    pts.sort((a,b)=>a.z-b.z);
    for(const q of pts){
      const s=q.s,w=CW*s,h=CH*s;
      if(q.px+w<0||q.px>W||q.py+h<0||q.py>H)continue;
      const c=aCol(q.ch);if(!c)continue;
      const al=Math.min(1,s*1.5),depth=1-q.layer/(EL-1),shade=.35+depth*.65;
      const br=~~(c.r*.08),bg=~~(c.g*.06),bb=~~(c.b*.04);
      X.fillStyle=`rgba(${br},${bg},${bb},${.6*al*shade})`;X.fillRect(q.px,q.py,w,h);
      X.fillStyle=`rgba(${c.r},${c.g},${c.b},${al*shade})`;
      X.font=`${Math.max(1,~~(FS*s))}px ${FONT}`;X.textBaseline='top';X.fillText(q.ch,q.px,q.py);
    }

    hintAlpha=Math.max(0,hintAlpha-.002);
    if(hintAlpha>.01){
      X.fillStyle=`rgba(255,176,0,${hintAlpha*.55})`;X.font=`13px ${FONT}`;X.textAlign='center';
      X.fillText('[ click to open terminal ]',W/2,oy+ah/2+CH*2);X.textAlign='start';
    }
  }catch(e){console.error('render:',e)}
  requestAnimationFrame(render);
}

// ── Interactive Terminal ────────────────────────────────────────────
const termOverlay=document.getElementById('termOverlay');
const termBody=document.getElementById('termBody');
const termScreen=document.getElementById('termScreen');
const termClose=document.getElementById('termClose');
const termMin=document.getElementById('termMin');
let termOpen=false,inputLine='',cmdHistory=[],histIdx=-1;

const CMD={
  help:()=>[
    '<span class="dim">Available commands:</span>',
    '',
    '  whoami               display user profile',
    '  ver                  display DOS version',
    '  date | time          show current date/time',
    '  echo &lt;text&gt;          display a message',
    '  cls                  clear screen',
    '',
    '  cat &lt;file&gt;           read a file',
    '  type &lt;file&gt;          alias for cat',
    '  dir [path]           list directory',
    '  cd                   show current directory',
    '  tree                 directory tree',
    '',
    '  mem                  show memory info',
    '  vol                  show volume label',
    '  path                 show PATH',
    '  systeminfo           system info',
    '  netstat              network status',
    '',
    '  ping &lt;host&gt;          test connectivity',
    '  uptime               system status',
    '  help | ?             show this help',
    '',
    '  exit                 close terminal',
  ],
  cls:()=>null, exit:()=>null,
};

function execCmd(cmd){
  const parts=cmd.trim().split(/\s+/);
  const name=parts[0].toLowerCase();
  const arg=parts.slice(1).join(' ');

  if(name==='help'||name==='?') return CMD.help();
  if(name==='cls') return null;
  if(name==='exit') return null;

  if(name==='whoami') return [
    'sislecv',
    'senior engineer \u2022 ai orchestration',
  ];

  if(name==='ver') return [
    'MS-DOS Version 6.22',
    '  (C)Copyright Microsoft Corp 1981-1995.',
    '  SISLEVC 5151 Personal Edition',
  ];

  if(name==='date') return [
    `Current date is ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`,
  ];

  if(name==='time') return [
    `Current time is ${new Date().toLocaleTimeString('en-US')}`,
  ];

  if(name==='echo') return [arg||'ECHO is on.'];

  if(name==='vol') return [
    'Volume in drive C has no label',
    'Volume Serial Number is 5151-BS0D',
  ];

  if(name==='mem'){
    const used=Math.round(Math.random()*128+512);
    const free=65536-used;
    return [
      'Memory Type        Total     Used     Free',
      '───────────────────────────────────────────',
      `Conventional       640KB     ${used}KB     ${free}KB`,
      'Extended           65536KB   0KB      65536KB',
      '───────────────────────────────────────────',
      `Total memory       66176KB   ${used}KB    ${640+free}KB`,
    ];
  }

  if(name==='path') return ['PATH=C:\\DOS;C:\\WINDOWS;C:\\BATCH'];

  if(name==='cd'||name==='chdir') return ['C:\\'];

  if(name==='tree') return [
    'C:.',
    '\u251C\u2500\u2500\u2500DOS',
    '\u251C\u2500\u2500\u2500SKILLS',
    '\u2502   PYTHON.EXE',
    '\u2502   NODEJS.EXE',
    '\u2502   AGENTS.DLL',
    '\u2502   REACT.SYS',
    '\u2502   DOCKER.COM',
    '\u2502   GIT.BIN',
    '\u2502   BASH.EXE',
    '\u251C\u2500\u2500\u2500BATCH',
    '\u2514\u2500\u2500\u2500TEMP',
  ];

  if(name==='systeminfo') return [
    'Host:          SISLEVC 5151',
    'OS:            MS-DOS 6.22',
    'CPU:           Sisyphus Engine',
    'Memory:        64MB EMS + 640KB Conv',
    'Drive C:       2GB, 1.8GB free',
    'Shell:         COMMAND.COM',
    'Terminal:      VT323 80x25',
    'User:          s Islecv',
  ];

  if(name==='netstat') return [
    'Active Connections',
    '',
    '  Proto  Local Address     Foreign Address   State',
    '  TCP    C:23 (TELNET)     github.com:https  ESTABLISHED',
    '  TCP    C:80 (HTTP)       sislecv.github.io ESTABLISHED',
    '  UDP    C:53 (DNS)        resolver          LISTENING',
  ];

  if(name==='cat'||name==='type'){
    const fn=arg.toLowerCase();
    if(fn==='profile.txt'||fn==='profile') return [
      'sislecv / SISLEVC 5151',
      '',
      'Systems builder with a taste for terminal aesthetics.',
      'Engineer at the intersection of infrastructure, automation,',
      'and agentic AI. Ships production code, designs protocols,',
      'orchestrates swarms of sub-agents \u2014 one tty at a time.',
    ];
    if(fn==='contact.txt'||fn==='contact') return [
      '  email:  s Islecv2@gmail.com',
      '  github: github.com/Sislecv',
      '  site:   s Islecv.github.io',
    ];
    if(fn==='')
    return ['The syntax of the command is incorrect.'];
    return [`File not found: ${arg}`];
  }

  if(name==='dir'){
    if(!arg||arg==='.'||arg==='\\'||arg==='/skills/'||arg==='c:\\'){
      return [
        '<span class="dim"> Directory of C:\\</span>',
        '',
        'DOS       &lt;DIR&gt;    01-07-26',
        'SKILLS    &lt;DIR&gt;    01-07-26  <span class="dim">&lt;-- try "dir /skills/"</span>',
        'BATCH     &lt;DIR&gt;    01-07-26',
        'TEMP      &lt;DIR&gt;    01-07-26',
        'PROFILE   TXT      214 01-07-26',
        'CONTACT   TXT       96 01-07-26',
        'CONFIG    SYS      156 01-07-26',
        'AUTOEXEC  BAT      128 01-07-26',
        '        8 File(s)',
      ];
    }
    if(arg==='/skills'||arg==='/skills/'||arg==='skills'){
      return [
        '<span class="dim"> Directory of C:\\SKILLS</span>',
        '',
        'PYTHON.EXE    infra, tooling, automation',
        'NODEJS.EXE    runtimes, APIs, pipelines',
        'AGENTS.DLL    LLM orchestration, RAG, swarms',
        'REACT.SYS     frontend \u2022 UI systems',
        'DOCKER.COM    containerization, compose, deploy',
        'GIT.BIN       version control, CI/CD',
        'BASH.EXE      shell scripting, devops',
        '        7 File(s)',
      ];
    }
    return [`Invalid path: ${arg}`];
  }

  if(name==='ping'){
    const host=arg||'sislecv.github.io';
    return [
      `Pinging ${host} [185.199.108.153] with 32 bytes of data:`,
      'Reply from 185.199.108.153: bytes=32 time=12ms TTL=59',
      'Reply from 185.199.108.153: bytes=32 time=14ms TTL=59',
      'Reply from 185.199.108.153: bytes=32 time=11ms TTL=59',
      'Reply from 185.199.108.153: bytes=32 time=13ms TTL=59',
      '<span class="dim">    Packets: Sent = 4, Received = 4, Lost = 0 (0% loss),</span>',
    ];
  }

  if(name==='uptime') return ['on fire since the dial-up era'];

  return [`Unknown command: ${name}`];
}

function print(lines){
  if(!lines)return;
  for(const l of lines) termBody.innerHTML+=l+'\n';
  termBody.scrollTop=termBody.scrollHeight;
}

function printPrompt(){
  termBody.innerHTML+='<span class="prompt">C:\\&gt;</span> <span class="cmd">'+escHtml(inputLine)+'</span><span class="cursor-blink"></span>';
  termBody.scrollTop=termBody.scrollHeight;
  // Remove trailing cursor for next render
}

function escHtml(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderLine(){
  const lines=termBody.innerHTML.split('\n');
  while(lines.length&&lines[lines.length-1].trim()==='')lines.pop();
  if(lines.length&&lines[lines.length-1].includes('prompt'))lines.pop();
  termBody.innerHTML=lines.join('\n')+(lines.length?'\n':'');
  termBody.innerHTML+='<span class="prompt">C:\\&gt;</span> <span class="cmd">'+escHtml(inputLine)+'</span><span class="cursor-blink"></span>';
  termBody.scrollTop=termBody.scrollHeight;
}

function submitCmd(){
  const cmd=inputLine.trim();
  if(!cmd){inputLine='';renderLine();return}
  cmdHistory.push(cmd);histIdx=cmdHistory.length;
  // Remove the prompt line to replace with submitted command
  const parts=termBody.innerHTML.split('\n');
  if(parts.length&&parts[parts.length-1].includes('prompt'))parts.pop();
  if(parts.length&&parts[parts.length-1].trim()==='')parts.pop();
  termBody.innerHTML=parts.join('\n')+(parts.length?'\n':'');
  termBody.innerHTML+='<span class="prompt">C:\\&gt;</span> <span class="cmd">'+escHtml(cmd)+'</span>\n';
  inputLine='';
  const result=execCmd(cmd);
  if(result===null){ // cls
    termBody.innerHTML='';renderLine();return;
  }
  print(result);
  renderLine();
}

function handleKey(e){
  if(!termOpen)return;
  if(e.key==='Escape'){closeTerminal();return}
  e.preventDefault();
  if(e.key==='Enter'){submitCmd();return}
  if(e.key==='Backspace'){
    if(inputLine.length>0)inputLine=inputLine.slice(0,-1);
    renderLine();return;
  }
  if(e.key==='ArrowUp'){
    if(cmdHistory.length===0)return;
    histIdx=Math.max(0,histIdx-1);
    inputLine=cmdHistory[histIdx];
    renderLine();return;
  }
  if(e.key==='ArrowDown'){
    histIdx=Math.min(cmdHistory.length,histIdx+1);
    inputLine=histIdx>=cmdHistory.length?'':cmdHistory[histIdx];
    renderLine();return;
  }
  if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
    inputLine+=e.key;renderLine();
  }
}

function openTerminal(){
  if(termOpen)return;
  termOpen=true;
  termOverlay.classList.add('open');
  termScreen.classList.add('flash');
  setTimeout(()=>termScreen.classList.remove('flash'),500);
  termBody.innerHTML='';
  hintAlpha=0;

  // Boot sequence
  print([
    '',
    '<span class="dim">Microsoft(R) MS-DOS 6.22</span>',
    '<span class="dim">   (C)Copyright Microsoft Corp 1981-1995.</span>',
    '',
  ]);
  // Show help automatically
  print(CMD.help());
  renderLine();
  termBody.style.display='block';
  termBody.focus();
}

function closeTerminal(){termOpen=false;termOverlay.classList.remove('open')}

C.addEventListener('click',openTerminal);
termClose.addEventListener('click',e=>{e.stopPropagation();closeTerminal()});
termMin.addEventListener('click',e=>{e.stopPropagation();closeTerminal()});
termOverlay.addEventListener('click',e=>{if(e.target===termOverlay)closeTerminal()});
document.addEventListener('keydown',handleKey);

requestAnimationFrame(render);
</script>
